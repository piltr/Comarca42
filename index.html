<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Comarca - Hub de Servicios</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.15);
            --blur: blur(20px);
            --border: 1px solid rgba(255, 255, 255, 0.2);
            --acento: #e67e22;
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('El-Bolson-Ph_-M.-Luz-Cardozo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overflow: hidden;
        }

        .header-main {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: var(--blur);
            border-bottom: var(--border);
            z-index: 1000;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .card-service {
            background: var(--glass);
            backdrop-filter: var(--blur);
            padding: 25px 15px;
            border-radius: 28px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-service:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }
        
        .card-service i { 
            font-size: 32px; 
            margin-bottom: 8px; 
            font-style: normal;
        }
        
        .card-service span { 
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .card-service.active-bus {
            background: var(--acento);
            border: none;
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
        }

        .live-feed {
            width: 100%;
            max-width: 460px;
            margin-top: 30px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 12px;
            border: var(--border);
            text-align: center;
        }

        #user-tag {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        #user-tag:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <header class="header-main">
        <h2 style="margin:0; font-size: 16px; letter-spacing: 2px;">🏔️ LA COMARCA</h2>
        <div id="user-tag" style="font-size: 10px; font-weight: 800;">CARGANDO...</div>
    </header>

<main class="main-content">
    <div class="services-grid">
        <a href="chat.html" class="card-service"><i>💬</i><span>Social</span></a>
        <a href="perfil.html" class="card-service"><i>👤</i><span>Perfil</span></a>
        <a href="productos.html" class="card-service"><i>🛍️</i><span>Productos</span></a>
        <a href="LaGolondrina.html" class="card-service active-bus">
            <i>🚌</i><span>Colectivos</span>
        </a>
        <a href="eventos.html" class="card-service"><i>📅</i><span>Eventos</span></a>
        <a href="literatura.html" class="card-service"><i>📖</i><span>Literatura Local</span></a>
    </div>

    <div class="live-feed" id="feed-mensajes">
        Buscando señales en el Paralelo 42...
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7FUrAK478GwlfGg-GTU15G683zQ3rWU0",
        authDomain: "mapa-comarca.firebaseapp.com",
        projectId: "mapa-comarca",
        storageBucket: "mapa-comarca.firebasestorage.app",
        messagingSenderId: "369057855767",
        appId: "1:369057855767:web:68fa4a6a85e811dc149f52"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const userTag = document.getElementById('user-tag');
    const feed = document.getElementById('feed-mensajes');
    let currentUser = null;

    // --- LÓGICA DE ESTADO DE SESIÓN ---
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            userTag.innerText = user.displayName.toUpperCase();
        } else {
            userTag.innerText = "INICIAR SESIÓN";
        }
    });

    // --- LÓGICA DE PROTECCIÓN DE RUTAS ---
    document.querySelectorAll('.card-service').forEach(link => {
        link.onclick = (e) => {
            const destino = link.getAttribute('href');
            
            // Si el link va a chat o perfil y NO hay usuario
            if ((destino === "chat.html" || destino === "perfil.html") && !currentUser) {
                e.preventDefault(); // Evita que el navegador cambie de página
                
                // Animación visual y mensaje en el feed inferior
                feed.style.color = "#ff4757"; // Rojo suave para error
                feed.innerHTML = "⚠️ ACCESO DENEGADO: Inicia sesión arriba a la derecha para entrar.";
                
                // Resaltamos el botón de login para guiar al usuario
                userTag.style.boxShadow = "0 0 15px #e67e22";
                setTimeout(() => userTag.style.boxShadow = "none", 2000);
            }
        };
    });

    // --- LOGIN ---
    userTag.onclick = async () => {
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error(error);
            alert("Error al conectar con Google.");
        }
    };

    // --- FEED DE MENSAJES ---
    const q = query(collection(db, "mensajes"), orderBy("tiempo", "desc"), limit(1));
    onSnapshot(q, (snapshot) => {
        snapshot.forEach(doc => {
            const data = doc.data();
            // Solo actualiza si no hay un mensaje de advertencia activo
            if (!feed.innerHTML.includes("ACCESO DENEGADO")) {
                feed.innerHTML = `<span style="color: var(--acento)">ÚLTIMO AVISO:</span> ${data.nombre}: ${data.texto}`;
            }
        });
    });
</script>
</body>
</html>
