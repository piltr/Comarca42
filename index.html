<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Comarca - Hub de Servicios</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.15);
            --blur: blur(20px);
            --border: 1px solid rgba(255, 255, 255, 0.2);
            --acento: #e67e22;
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('El-Bolson-Ph_-M.-Luz-Cardozo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overflow: hidden;
        }

        .header-main {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: var(--blur);
            border-bottom: var(--border);
            z-index: 1000;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .card-service {
            background: var(--glass);
            backdrop-filter: var(--blur);
            padding: 25px 15px;
            border-radius: 28px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-service:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }
        
        .card-service i { font-size: 32px; margin-bottom: 8px; font-style: normal; }
        
        .card-service span { 
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .live-feed {
            width: 100%;
            max-width: 460px;
            margin-top: 30px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 12px;
            border: var(--border);
            text-align: center;
        }

        #user-tag {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- ESTILOS DEL MODAL EMERGENTE --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--glass);
            backdrop-filter: var(--blur);
            padding: 30px;
            border-radius: 30px;
            border: var(--border);
            max-width: 300px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-content h3 { color: var(--acento); margin-top: 0; }
        .modal-content p { font-size: 14px; opacity: 0.9; margin-bottom: 20px; }

        .btn-modal-login {
            background: var(--acento);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-close-modal {
            background: transparent;
            color: white;
            border: none;
            margin-top: 10px;
            font-size: 11px;
            text-decoration: underline;
            cursor: pointer;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header class="header-main">
        <h2 style="margin:0; font-size: 16px; letter-spacing: 2px;">🏔️ LA COMARCA</h2>
        <div id="user-tag" style="font-size: 10px; font-weight: 800;">CARGANDO...</div>
    </header>

<main class="main-content">
    <div class="services-grid">
        <a href="chat.html" class="card-service"><i>💬</i><span>Social</span></a>
        <a href="perfil.html" class="card-service"><i>👤</i><span>Perfil</span></a>
        <a href="productos.html" class="card-service"><i>🛍️</i><span>Productos</span></a>
        <a href="LaGolondrina.html" class="card-service"><i>🚌</i><span>Colectivos</span></a>
        <a href="eventos.html" class="card-service"><i>📅</i><span>Eventos</span></a>
        <a href="literatura.html" class="card-service"><i>📖</i><span>Literatura Local</span></a>
    </div>

    <div class="live-feed" id="feed-mensajes">
        Buscando señales en el Paralelo 42...
    </div>
</main>

<div class="modal-overlay" id="login-modal">
    <div class="modal-content">
        <h3>ACCESO RESTRINGIDO</h3>
        <p>Para entrar a la zona social o ver tu perfil, primero debes iniciar sesión.</p>
        <button class="btn-modal-login" id="modal-login-btn">INICIAR SESIÓN AHORA</button>
        <br>
        <button class="btn-close-modal" onclick="closeModal()">CERRAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7FUrAK478GwlfGg-GTU15G683zQ3rWU0",
        authDomain: "mapa-comarca.firebaseapp.com",
        projectId: "mapa-comarca",
        storageBucket: "mapa-comarca.firebasestorage.app",
        messagingSenderId: "369057855767",
        appId: "1:369057855767:web:68fa4a6a85e811dc149f52"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const userTag = document.getElementById('user-tag');
    const feed = document.getElementById('feed-mensajes');
    const loginModal = document.getElementById('login-modal');
    const modalLoginBtn = document.getElementById('modal-login-btn');
    let currentUser = null;

    // --- FUNCIÓN PARA ABRIR/CERRAR MODAL ---
    window.closeModal = () => { loginModal.style.display = 'none'; };

    // --- LÓGICA DE ESTADO DE SESIÓN ---
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            userTag.innerText = user.displayName.toUpperCase();
            closeModal(); // Si se loguea desde el modal, que se cierre
        } else {
            userTag.innerText = "INICIAR SESIÓN";
        }
    });

    // --- PROTECCIÓN DE RUTAS CON MODAL ---
    document.querySelectorAll('.card-service').forEach(link => {
        link.onclick = (e) => {
            const destino = link.getAttribute('href');
            if ((destino === "chat.html" || destino === "perfil.html") && !currentUser) {
                e.preventDefault();
                loginModal.style.display = 'flex'; // Mostramos el modal
            }
        };
    });

    // --- LOGIN (Compartido por Header y Modal) ---
    const iniciarSesion = async () => {
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error(error);
            alert("Error al conectar con Google.");
        }
    };

    userTag.onclick = iniciarSesion;
    modalLoginBtn.onclick = iniciarSesion;

    // --- FEED DE MENSAJES ---
    const q = query(collection(db, "mensajes"), orderBy("tiempo", "desc"), limit(1));
    onSnapshot(q, (snapshot) => {
        snapshot.forEach(doc => {
            const data = doc.data();
            feed.innerHTML = `<span style="color: var(--acento)">ÚLTIMO AVISO:</span> ${data.nombre}: ${data.texto}`;
        });
    });
</script>
</body>
</html>
