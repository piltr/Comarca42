<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Comarca - Mercado Local</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.15);
            --blur: blur(20px);
            --border: 1px solid rgba(255, 255, 255, 0.2);
            --acento: #e67e22;
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('El-Bolson-Ph_-M.-Luz-Cardozo.jpg'); /* Misma imagen de fondo */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header-nav {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: var(--blur);
            border-bottom: var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-back {
            text-decoration: none;
            color: white;
            font-size: 20px;
            margin-right: 15px;
        }

        /* Grid de Productos */
        .products-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            flex-grow: 1;
        }

        .product-card {
            background: var(--glass);
            backdrop-filter: var(--blur);
            border-radius: 20px;
            border: var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .product-card:active { transform: scale(0.98); }

        .product-img {
            width: 100%;
            height: 140px;
            background: rgba(255,255,255,0.1);
            object-fit: cover;
        }

        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-size: 16px;
            font-weight: 800;
            color: var(--acento);
        }

        .btn-buy {
            background: var(--acento);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Barra de búsqueda */
        .search-bar {
            margin: 15px 20px 0;
            background: var(--glass);
            border: var(--border);
            padding: 12px 20px;
            border-radius: 50px;
            backdrop-filter: var(--blur);
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            font-family: inherit;
            outline: none;
        }

        .search-bar input::placeholder { color: rgba(255,255,255,0.6); }

        /* Estado vacío */
        #loading-msg {
            text-align: center;
            margin-top: 50px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header class="header-nav">
        <a href="index.html" class="btn-back">←</a>
        <h2 style="margin:0; font-size: 16px; letter-spacing: 1px;">MERCADO LOCAL</h2>
    </header>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar productos en la Comarca...">
    </div>

    <main class="products-container" id="grid-productos">
        <div id="loading-msg">Conectando con artesanos locales...</div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7FUrAK478GwlfGg-GTU15G683zQ3rWU0",
            authDomain: "mapa-comarca.firebaseapp.com",
            projectId: "mapa-comarca",
            storageBucket: "mapa-comarca.firebasestorage.app",
            messagingSenderId: "369057855767",
            appId: "1:369057855767:web:68fa4a6a85e811dc149f52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const grid = document.getElementById('grid-productos');

        // Escuchar cambios en la colección "productos" de Firestore
        const q = query(collection(db, "productos"), orderBy("nombre", "asc"));

        onSnapshot(q, (snapshot) => {
            grid.innerHTML = "";
            
            if (snapshot.empty) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>No hay productos disponibles por ahora.</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const p = doc.data();
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${p.imagen || 'https://via.placeholder.com/150'}" class="product-img" alt="${p.nombre}">
                    <div class="product-info">
                        <p class="product-name">${p.nombre}</p>
                        <span class="product-price">$${p.precio}</span>
<button class="btn-buy" onclick="window.location.href='https://wa.me/${p.whatsapp}?text=Hola! Vi el producto ${p.nombre} en La Comarca y me interesa.'">Comprar</button>                    </div>
                `;
                grid.appendChild(card);
            });
        });

        // Lógica simple de búsqueda local
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                const name = card.querySelector('.product-name').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
