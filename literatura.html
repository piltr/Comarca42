<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literatura - Autores de la Comarca</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.12);
            --blur: blur(25px);
            --border: 1px solid rgba(255, 255, 255, 0.2);
            --acento: #e67e22;
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('Gemini_Generated_Image_6r3l1l6r3l1l6r3l.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overflow: hidden;
        }

        .header-main {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--blur);
            border-bottom: var(--border);
            z-index: 1000;
        }

        .btn-volver {
            text-decoration: none;
            color: white;
            font-size: 12px;
            font-weight: 800;
            background: var(--glass);
            padding: 8px 15px;
            border-radius: 15px;
            border: var(--border);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .section-title h1 {
            font-size: 24px;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .authors-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            padding-bottom: 40px;
        }

        .author-card {
            background: var(--glass);
            backdrop-filter: var(--blur);
            border-radius: 30px;
            padding: 20px;
            border: var(--border);
            display: flex;
            gap: 20px;
            align-items: center;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .author-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
            border-color: var(--acento);
        }

        .author-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #333;
            flex-shrink: 0;
            border: 2px solid var(--acento);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .author-info h3 {
            margin: 0;
            font-size: 17px;
            color: var(--acento);
        }

        .author-info p {
            margin: 5px 0 0 0;
            font-size: 12px;
            line-height: 1.4;
            opacity: 0.9;
        }

        .genre-tag {
            display: inline-block;
            font-size: 9px;
            background: rgba(230, 126, 34, 0.2);
            padding: 3px 10px;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid var(--acento);
            text-transform: uppercase;
        }

        /* --- LECTOR MODAL --- */
        #pdf-viewer-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            z-index: 2000;
        }

        .viewer-header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: var(--border);
        }

        #pdf-frame {
            flex-grow: 1;
            border: none;
            width: 100%;
        }

        .close-btn {
            background: var(--acento);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            font-size: 12px;
        }

        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: var(--acento); border-radius: 10px; }
    </style>
</head>
<body>

    <header class="header-main">
        <a href="index.html" class="btn-volver">← VOLVER</a>
        <h2 style="margin:0; font-size: 14px; letter-spacing: 2px;">📖 BIBLIOTECA</h2>
        <div id="user-tag" style="font-size: 10px; font-weight: 800; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px;">LECTOR</div>
    </header>

<main class="main-content">
    <div class="section-title">
        <h1>Letras de la Comarca</h1>
        <p>Investigación y relatos del Paralelo 42</p>
    </div>

    <div class="authors-container">
        <div class="author-card" onclick="openReader('libros/capítulo Aloras.pdf', 'Desarrollo Territorial Rurbano')">
            <div class="author-img">🏙️</div>
            <div class="author-info">
                <h3>Gabriela Aloras</h3>
                <p>El desarrollo territorial de la Comarca Andina del paralelo 42 como espacio rurbano (2020).</p>
                <span class="genre-tag">Investigación / Territorio</span>
            </div>
        </div>

        </div>
</main>

<div id="pdf-viewer-modal">
    <div class="viewer-header">
        <span id="current-title" style="font-size: 12px; font-weight: 600; letter-spacing: 1px;">LEYENDO...</span>
        <button class="close-btn" onclick="closeReader()">CERRAR</button>
    </div>
    <iframe id="pdf-frame" src=""></iframe>
</div>

<script>
    const modal = document.getElementById('pdf-viewer-modal');
    const frame = document.getElementById('pdf-frame');
    const titleText = document.getElementById('current-title');

    function openReader(url, title) {
        titleText.innerText = title.toUpperCase();
        frame.src = url;
        modal.style.display = 'flex';
    }

    function closeReader() {
        modal.style.display = 'none';
        frame.src = '';
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7FUrAK478GwlfGg-GTU15G683zQ3rWU0",
        authDomain: "mapa-comarca.firebaseapp.com",
        projectId: "mapa-comarca",
        storageBucket: "mapa-comarca.firebasestorage.app",
        messagingSenderId: "369057855767",
        appId: "1:369057855767:web:68fa4a6a85e811dc149f52"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const userTag = document.getElementById('user-tag');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userTag.innerText = user.displayName.toUpperCase();
        }
    });
</script>
</body>
</html>
