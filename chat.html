<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat La Comarca - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.15);
            --blur: blur(20px);
            --border: 1px solid rgba(255, 255, 255, 0.2);
            --acento: #e67e22;
            --espera: #f1c40f; 
            --viaje: #2ecc71;
        }

        body { 
            font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; 
            display: flex; flex-direction: column; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('El-Bolson-Ph_-M.-Luz-Cardozo.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; 
            color: white; overflow: hidden;
        }
        
        header { 
            background: rgba(0, 0, 0, 0.3); backdrop-filter: var(--blur); 
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            z-index: 10; border-bottom: var(--border);
        }

        .btn-volver {
            text-decoration: none; color: white; font-size: 12px; font-weight: 600;
            background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px;
            transition: 0.3s; border: var(--border);
        }
        .btn-volver:hover { background: rgba(255,255,255,0.3); }

        .user-pill {
            background: var(--glass); padding: 6px 15px; border-radius: 25px;
            font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 10px;
            border: var(--border); backdrop-filter: var(--blur);
        }
        .user-balance { color: var(--espera); font-weight: 800; }
        
        #chat-messages { 
            flex-grow: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 18px; scrollbar-width: none;
        }
        #chat-messages::-webkit-scrollbar { display: none; }

        /* --- BURBUJAS ESTILO PROFILE CARD --- */
        .msg-wrapper { display: flex; align-items: flex-end; gap: 12px; max-width: 85%; animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.other { align-self: flex-start; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .chat-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0; border: 2px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .msg-bubble { 
            padding: 12px 18px; border-radius: 22px; backdrop-filter: var(--blur);
            background: var(--glass); border: var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative;
        }
        
        .msg-wrapper.user .msg-bubble { background: rgba(255, 255, 255, 0.25); border-bottom-right-radius: 4px; }
        .msg-wrapper.other .msg-bubble { border-bottom-left-radius: 4px; transition: 0.2s; cursor: pointer; }
        
        /* Efecto de clic para enviar dinero */
        .msg-wrapper.other .msg-bubble:hover { transform: scale(1.02); border-color: var(--espera); box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }

        /* Mensajes de Sistema */
        .msg-wrapper.sistema { align-self: center; max-width: 90%; }
        .msg-wrapper.sistema .msg-bubble { background: rgba(0,0,0,0.5); border: 1px solid var(--espera); text-align: center; border-radius: 20px; }
        
        .msg-nombre { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.5px; }
        .msg-texto { font-size: 14px; font-weight: 400; line-height: 1.5; color: rgba(255,255,255,0.95); }

        .meta-info { display: flex; justify-content: space-between; align-items: center; gap: 15px; font-size: 9px; opacity: 0.6; margin-top: 8px; font-weight: 700; }
        .status-tag { padding: 2px 8px; border-radius: 10px; background: rgba(0,0,0,0.3); }
        .msg-bubble.espera { border-left: 4px solid var(--espera); }
        .msg-bubble.viaje { border-left: 4px solid var(--viaje); }

        /* --- MENU DE TRANSFERENCIA (MODAL) --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: var(--blur); animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background: var(--glass); border: var(--border); padding: 30px; border-radius: 30px;
            width: 85%; max-width: 340px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .modal-content h3 { margin: 0 0 5px; font-size: 18px; font-weight: 800; color: white; }
        .modal-content p { font-size: 12px; opacity: 0.8; margin-bottom: 20px; }
        
        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .amount-btn {
            background: rgba(0,0,0,0.4); border: var(--border); color: white; padding: 12px;
            border-radius: 15px; cursor: pointer; font-weight: 800; font-size: 16px; transition: 0.2s;
        }
        .amount-btn:hover, .amount-btn.selected { background: var(--espera); color: black; transform: scale(1.05); }

        .modal-actions { display: flex; gap: 15px; }
        .btn-cancel { background: rgba(255,255,255,0.2); border: var(--border); padding: 12px; border-radius: 20px; color: white; cursor: pointer; flex: 1; font-weight: 800; }
        .btn-confirm { background: var(--acento); border: none; padding: 12px; border-radius: 20px; color: white; cursor: pointer; flex: 1; font-weight: 800; }

        /* --- AREA INFERIOR --- */
        .area-inferior { background: rgba(0, 0, 0, 0.4); backdrop-filter: var(--blur); border-top: var(--border); padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .selector-estado { display: flex; justify-content: center; gap: 10px; padding: 12px 12px 5px 12px; }
        .opcion-estado { font-size: 10px; font-weight: 800; padding: 7px 16px; border-radius: 20px; cursor: pointer; border: var(--border); color: white; background: rgba(255,255,255,0.1); transition: 0.3s; }
        .opcion-estado.active { background: white !important; color: black !important; transform: scale(1.05); }
        .input-area { padding: 10px 20px; display: flex; gap: 12px; align-items: center; }
        #chat-input { flex-grow: 1; border: var(--border); padding: 14px 22px; border-radius: 30px; outline: none; background: rgba(255, 255, 255, 0.1); color: white; font-family: 'Poppins'; font-size: 15px; }
        #chat-input::placeholder { color: rgba(255,255,255,0.5); }
        .btn-send { background: var(--acento); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(230, 126, 34, 0.4); flex-shrink: 0; transition: 0.3s;}
        .btn-send:hover { transform: scale(1.1) rotate(-10deg); background: #f39c12; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-volver">⇠ MAPA</a>
        <h3 style="margin:0; font-size: 15px; font-weight: 800; letter-spacing: 1px;">🏔️ LA COMARCA</h3>
        <div class="user-pill" onclick="window.location.href='perfil.html'" style="cursor: pointer;">
            <span id="mi-emoji-header">👤</span>
            <span class="user-balance" id="mi-balance-header">0 CoC</span>
        </div>
    </header>

    <div id="chat-messages"></div>

    <div class="area-inferior">
        <div class="selector-estado" id="selector-estado">
            <div class="opcion-estado active" onclick="setEstado('ninguno', this)">NORMAL</div>
            <div class="opcion-estado" onclick="setEstado('espera', this)" style="border-color: var(--espera);">ESPERANDO</div>
            <div class="opcion-estado" onclick="setEstado('viaje', this)" style="border-color: var(--viaje);">EN VIAJE</div>
        </div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button class="btn-send" id="btn-enviar">➤</button>
        </div>
    </div>

    <div class="modal-overlay" id="transfer-modal">
        <div class="modal-content">
            <h3>💸 Enviar ComarCoins</h3>
            <p>Destinatario: <strong id="modal-target-name">Vecino</strong></p>
            
            <div class="amount-grid">
                <button class="amount-btn" onclick="seleccionarMonto(10, this)">10</button>
                <button class="amount-btn" onclick="seleccionarMonto(50, this)">50</button>
                <button class="amount-btn" onclick="seleccionarMonto(100, this)">100</button>
                <button class="amount-btn" onclick="seleccionarMonto(200, this)">200</button>
                <button class="amount-btn" onclick="seleccionarMonto(500, this)">500</button>
                <button class="amount-btn" onclick="seleccionarMonto(1000, this)">1K</button>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-confirm" onclick="confirmarTransferencia()">Enviar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, limit, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7FUrAK478GwlfGg-GTU15G683zQ3rWU0",
            authDomain: "mapa-comarca.firebaseapp.com",
            projectId: "mapa-comarca",
            storageBucket: "mapa-comarca.firebasestorage.app",
            messagingSenderId: "369057855767",
            appId: "1:369057855767:web:68fa4a6a85e811dc149f52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "mensajes");

        let miNombre = "Invitado";
        let miId = null;
        let miEmoji = "👤";
        let miColor = "#e67e22";
        let misPuntos = 0; // Guardamos el balance actual

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                miNombre = user.displayName;
                miId = user.uid;
                
                // Escuchar mis propios datos para mantener el balance actualizado arriba a la derecha
                onSnapshot(doc(db, "usuarios", miId), (docSnap) => {
                    if(docSnap.exists()){
                        const d = docSnap.data();
                        miEmoji = d.emoji || "👤";
                        miColor = d.color || "#e67e22";
                        misPuntos = d.puntos || 0;
                        document.getElementById('mi-emoji-header').innerText = miEmoji;
                        document.getElementById('mi-balance-header').innerText = misPuntos + " CoC";
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });

        // --- SISTEMA DE TRANSFERENCIAS ---
        let targetId = null;
        let targetNombre = null;
        let montoSeleccionado = 0;

        window.abrirModal = (idDestino, nombreDestino) => {
            if (idDestino === miId || idDestino === "sistema") return; // No enviarse a uno mismo ni al sistema
            targetId = idDestino;
            targetNombre = nombreDestino;
            document.getElementById('modal-target-name').innerText = nombreDestino.toUpperCase();
            document.getElementById('transfer-modal').style.display = 'flex';
            montoSeleccionado = 0;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
        };

        window.cerrarModal = () => {
            document.getElementById('transfer-modal').style.display = 'none';
        };

        window.seleccionarMonto = (monto, el) => {
            montoSeleccionado = monto;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.confirmarTransferencia = async () => {
            if (montoSeleccionado === 0) {
                alert("Selecciona un monto primero."); return;
            }
            if (misPuntos < montoSeleccionado) {
                alert(`No tienes suficientes fondos. Tu balance es: ${misPuntos} CoC`); return;
            }

            try {
                // Descontar a mi cuenta
                await updateDoc(doc(db, "usuarios", miId), { puntos: increment(-montoSeleccionado) });
                // Sumar a la cuenta destino
                await updateDoc(doc(db, "usuarios", targetId), { puntos: increment(montoSeleccionado) });
                
                // Anunciar en el chat
                await addDoc(colRef, {
                    texto: `💸 ${miNombre} le envió ${montoSeleccionado} 🥥CoCos🥥 a ${targetNombre}`,
                    nombre: "Banco Comarca",
                    id: "sistema",
                    estado: "ninguno",
                    emoji: "🪙",
                    color: "#f1c40f",
                    tiempo: serverTimestamp()
                });

                cerrarModal();
            } catch (error) {
                console.error("Error en la transferencia", error);
                alert("Hubo un error al transferir. ¿El destino abrió su perfil alguna vez?");
            }
        };

        // --- LÓGICA DE MENSAJES ---
        let estadoActual = "ninguno";
        window.setEstado = (nuevo, el) => {
            estadoActual = nuevo;
            document.querySelectorAll('.opcion-estado').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        };

        window.enviarMensaje = async () => {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if (texto !== "" && miId) {
                input.value = "";
                try {
                    await addDoc(colRef, {
                        texto: texto,
                        nombre: miNombre,
                        id: miId,
                        estado: estadoActual,
                        emoji: miEmoji,
                        color: miColor,
                        tiempo: serverTimestamp()
                    });
                } catch (e) { console.error(e); }
            }
        };

        document.getElementById('btn-enviar').onclick = enviarMensaje;
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensaje(); });

        const q = query(colRef, orderBy("tiempo", "asc"), limit(50));
        onSnapshot(q, (snapshot) => {
            const contenedor = document.getElementById('chat-messages');
            contenedor.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const esMio = data.id === miId;
                const esSistema = data.id === "sistema";
                
                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${esSistema ? 'sistema' : (esMio ? 'user' : 'other')}`;

                // Si no es mío y no es del sistema, lo hacemos clickeable para enviar CoC
                if (!esMio && !esSistema) {
                    wrapper.onclick = () => abrirModal(data.id, data.nombre);
                }

                const labels = { "espera": "⏱️ ESPERANDO", "viaje": "🚌 EN VIAJE", "ninguno": "" };
                const hora = data.tiempo ? new Date(data.tiempo.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...';
                
                wrapper.innerHTML = `
                    <div class="chat-avatar" style="background: ${data.color || '#e67e22'}">
                        ${data.emoji || '👤'}
                    </div>
                    <div class="msg-bubble ${data.estado || 'ninguno'}">
                        <span class="msg-nombre" style="color: ${data.color || '#e67e22'}">
                            ${esMio ? 'Tú' : (data.nombre || 'Vecino')}
                        </span>
                        <div class="msg-texto">${data.texto}</div>
                        <div class="meta-info">
                            ${data.estado && data.estado !== 'ninguno' ? `<span class="status-tag">${labels[data.estado]}</span>` : '<span></span>'}
                            <span>${hora}</span>
                        </div>
                    </div>
                `;
                contenedor.appendChild(wrapper);
            });
            contenedor.scrollTop = contenedor.scrollHeight;
        });
    </script>
</body>
</html>
