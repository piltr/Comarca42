<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - La Comarca</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.15);
            --blur: blur(20px);
            --border: 1px solid rgba(255, 255, 255, 0.2);
            --acento: #e67e22;
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; height: 100vh;
            display: flex; flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('El-Bolson-Ph_-M.-Luz-Cardozo.jpg');
            background-size: cover; background-position: center; color: white;
            transition: background 0.5s ease;
            overflow: hidden;
        }

        header {
            padding: 15px 25px; display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: var(--blur); border-bottom: var(--border);
        }

        .btn-volver {
            text-decoration: none; color: white; font-size: 12px; font-weight: 600;
            background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; margin-right: 15px;
        }

        .profile-container {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .profile-card {
            background: var(--glass); backdrop-filter: var(--blur);
            padding: 30px; border-radius: 30px; border: var(--border);
            text-align: center; width: 100%; max-width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .avatar {
            width: 90px; height: 90px; background: var(--acento);
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center; font-size: 45px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .user-name { font-size: 20px; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .user-email { font-size: 11px; opacity: 0.7; margin-bottom: 20px; }

        .points-box {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px;
            border: 1px solid var(--acento); margin-bottom: 25px;
        }
        .points-value { font-size: 32px; font-weight: 800; color: var(--acento); }

        /* --- SECCIÓN PERSONALIZACIÓN --- */
        .custom-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            text-align: left;
        }
        .label-custom { font-size: 10px; font-weight: 700; opacity: 0.6; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        
        select {
            width: 100%; padding: 12px; border-radius: 15px; 
            background: rgba(0,0,0,0.4); color: white; border: var(--border); 
            margin-bottom: 20px; font-family: 'Poppins'; cursor: pointer;
            outline: none;
        }
        select option { background: #1a1a1a; color: white; }

        .color-grid { display: flex; justify-content: space-between; gap: 8px; }
        .opt-color { 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; 
            border: 2px solid white; transition: 0.2s; 
        }
        .opt-color:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-volver">⇠ VOLVER</a>
        <h3 style="margin:0; font-size: 14px; letter-spacing: 1px;">MI PERFIL</h3>
    </header>

    <main class="profile-container">
        <div class="profile-card">
            <div class="avatar" id="main-avatar">👤</div>
            <div class="user-name" id="name">Cargando...</div>
            <div class="user-email" id="email">...</div>

            <div class="points-box">
                <div class="points-value" id="points">0</div>
                <div style="font-size: 9px; font-weight: 800; letter-spacing: 1px;">COMARCOINS</div>
            </div>

            <div class="custom-section">
                <span class="label-custom">Elegir Emoji</span>
                <select id="emoji-selector">
                    <option value="👤">Predeterminado</option>
                    <optgroup label="Caritas">
                        <option value="😎">Facherito</option>
                        <option value="🐱‍💻">Programador</option>
                        <option value="🤠">Gaucho</option>
                        <option value="👽">Extraterrestre</option>
                        <option value="🤖">Robot</option>
                        <option value="👻">Fantasmita</option>
                        <option value="🎭">Máscara</option>
                        <option value="🤯">Explosión</option>
                    </optgroup>
                    <optgroup label="La Comarca">
                        <option value="🏔️">Montaña</option>
                        <option value="🌲">Pinos</option>
                        <option value="🍄">Hongo</option>
                        <option value="🦦">Huillín (Nutria)</option>
                        <option value="🦅">Águila Mora</option>
                        <option value="🧉">Matecito</option>
                        <option value="🍻">Birras</option>
                        <option value="🧶">Artesanía</option>
                    </optgroup>
                    <optgroup label="Aventura">
                        <option value="🧙">Mago</option>
                        <option value="🐉">Dragón</option>
                        <option value="🔥">Fogata</option>
                        <option value="🎸">Guitarra</option>
                        <option value="🎒">Mochilero</option>
                        <option value="🚴">Ciclista</option>
                    </optgroup>
                </select>

                <span class="label-custom">Color de Identidad</span>
                <div class="color-grid">
                    <div class="opt-color" style="background: #e67e22;" onclick="saveStyle('color', '#e67e22')"></div>
                    <div class="opt-color" style="background: #2ecc71;" onclick="saveStyle('color', '#2ecc71')"></div>
                    <div class="opt-color" style="background: #3498db;" onclick="saveStyle('color', '#3498db')"></div>
                    <div class="opt-color" style="background: #9b59b6;" onclick="saveStyle('color', '#9b59b6')"></div>
                    <div class="opt-color" style="background: #e74c3c;" onclick="saveStyle('color', '#e74c3c')"></div>
                    <div class="opt-color" style="background: #2c3e50;" onclick="saveStyle('color', '#2c3e50')"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7FUrAK478GwlfGg-GTU15G683zQ3rWU0",
            authDomain: "mapa-comarca.firebaseapp.com",
            projectId: "mapa-comarca",
            storageBucket: "mapa-comarca.firebasestorage.app",
            messagingSenderId: "369057855767",
            appId: "1:369057855767:web:68fa4a6a85e811dc149f52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userRef;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('name').innerText = user.displayName;
                document.getElementById('email').innerText = user.email;
                userRef = doc(db, "usuarios", user.uid);
                
                const docSnap = await getDoc(userRef);
                if (!docSnap.exists()) {
                    await setDoc(userRef, {
                        nombre: user.displayName,
                        puntos: 100,
                        emoji: "👤",
                        color: "#e67e22",
                        uid: user.uid
                    });
                }

                // Escuchar datos en tiempo real
                onSnapshot(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        document.getElementById('points').innerText = data.puntos;
                        document.getElementById('main-avatar').innerText = data.emoji || "👤";
                        document.getElementById('main-avatar').style.background = data.color || "#e67e22";
                        document.getElementById('emoji-selector').value = data.emoji || "👤";
                    }
                });

            } else {
                window.location.href = "index.html";
            }
        });

        // Al cambiar el desplegable
        document.getElementById('emoji-selector').onchange = (e) => {
            saveStyle('emoji', e.target.value);
        };

        // Función para guardar en Firebase
        window.saveStyle = async (campo, valor) => {
            if (!userRef) return;
            try {
                await updateDoc(userRef, { [campo]: valor });
            } catch (error) {
                console.error("Error al guardar:", error);
            }
        };
    </script>
</body>
</html>
